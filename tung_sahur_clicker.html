<!DOCTYPE html>
<html>
<head>
    <title>Tung Sahur Clicker</title>
    <style>
        body {
            background: linear-gradient(#0f172a, #020617);
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            margin-top: 20px;
        }

        #character {
            width: 220px;
            cursor: pointer;
            transition: transform 0.1s;
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        #upgradeBtn { background: #3b82f6; }
        #autoBtn { background: #f59e0b; }

        .floatingText {
            position: absolute;
            color: #22c55e;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s forwards;
        }

        @keyframes floatUp {
            from { opacity: 1; transform: translateY(0px); }
            to { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>

<h1>🌙 Tung Sahur Clicker</h1>

<h2>Wake Points: <span id="points">0</span></h2>

<img id="character" src="yourimage.png">

<p>Click him to wake people up 🔔</p>

<button id="upgradeBtn">Upgrade Click (+1) | Cost: <span id="upgradeCost">10</span></button>
<br>
<button id="autoBtn">Buy Drummer 🥁 | Cost: <span id="autoCost">50</span></button>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="sahur.mp3" type="audio/mpeg">
</audio>

<!-- CLICK SOUND -->
<audio id="clickSound">
    <source src="click.mp3" type="audio/mpeg">
</audio>

<script>
let points = 0;
let clickPower = 1;
let upgradeCost = 10;
let autoCost = 50;
let autoClickers = 0;

let musicStarted = false;

const pointsText = document.getElementById("points");

// LOAD SAVE
function loadGame() {
    let save = JSON.parse(localStorage.getItem("sahurSave"));
    if (save) {
        points = save.points || 0;
        clickPower = save.clickPower || 1;
        upgradeCost = save.upgradeCost || 10;
        autoCost = save.autoCost || 50;
        autoClickers = save.autoClickers || 0;
    }
}
loadGame();

// SAVE GAME
function saveGame() {
    localStorage.setItem("sahurSave", JSON.stringify({
        points,
        clickPower,
        upgradeCost,
        autoCost,
        autoClickers
    }));
}

// START MUSIC
function startMusic() {
    if (!musicStarted) {
        document.getElementById("bgMusic").play();
        musicStarted = true;
    }
}

// CLICK CHARACTER
document.getElementById("character").onclick = (e) => {
    startMusic();

    // click sound
    let sound = document.getElementById("clickSound");
    sound.currentTime = 0;
    sound.play();

    points += clickPower;

    // bounce
    let img = document.getElementById("character");
    img.style.transform = "scale(1.2)";
    setTimeout(() => img.style.transform = "scale(1)", 100);

    // floating text
    let text = document.createElement("div");
    text.className = "floatingText";
    text.innerText = "+" + clickPower;
    text.style.left = e.pageX + "px";
    text.style.top = e.pageY + "px";
    document.body.appendChild(text);

    setTimeout(() => text.remove(), 1000);

    update();
};

// UPGRADE
document.getElementById("upgradeBtn").onclick = () => {
    if (points >= upgradeCost) {
        points -= upgradeCost;
        clickPower++;
        upgradeCost = Math.floor(upgradeCost * 1.5);
        update();
    }
};

// AUTO CLICKER
document.getElementById("autoBtn").onclick = () => {
    if (points >= autoCost) {
        points -= autoCost;
        autoClickers++;
        autoCost = Math.floor(autoCost * 1.7);
        update();
    }
};

function update() {
    pointsText.innerText = points;
    document.getElementById("upgradeCost").innerText = upgradeCost;
    document.getElementById("autoCost").innerText = autoCost;
}

// AUTO CLICK LOOP
setInterval(() => {
    points += autoClickers;
    update();
}, 1000);

// AUTO SAVE
setInterval(() => {
    saveGame();
}, 3000);

// UPDATE ON LOAD
update();
</script>

</body>
</html>
