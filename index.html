<!DOCTYPE html>
<html>
<head>
<title>Tung Sahur Clicker</title>

<style>
body {
    margin: 0;
    background: linear-gradient(#0f172a, #020617);
    color: white;
    text-align: center;
    font-family: Arial;
    overflow-x: hidden;
}

h1 { margin-top: 10px; }

#character {
    width: 220px;
    cursor: pointer;
    animation: float 2s infinite ease-in-out;
    transition: transform 0.1s;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.shop {
    margin-top: 10px;
}

.floating {
    position: absolute;
    font-weight: bold;
    pointer-events: none;
    animation: floatUp 1s forwards;
}

@keyframes floatUp {
    from { opacity: 1; transform: translateY(0px); }
    to { opacity: 0; transform: translateY(-60px); }
}

.shake {
    animation: shake 0.2s;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(5px,0); }
    50% { transform: translate(-5px,0); }
    75% { transform: translate(5px,0); }
    100% { transform: translate(0,0); }
}
</style>
</head>

<body>

<h1>🌙 Tung Sahur Clicker</h1>

<h2>Points: <span id="points">0</span></h2>
<p>Combo: <span id="combo">0</span></p>
<p>CPS: <span id="cps">0</span></p>

<img id="character" src="yourimage.png">

<div class="shop">
    <button onclick="buyUpgrade()">Upgrade Click | Cost: <span id="upCost">10</span></button>
    <button onclick="buyAuto()">Buy Drummer 🥁 | Cost: <span id="autoCost">50</span></button>
</div>

<audio id="music" loop>
    <source src="sahur.mp3">
</audio>

<script>
// GAME DATA
let points=0, clickPower=1, upCost=10, autoCost=50, auto=0;
let combo=0, lastClick=0, cps=0, clicks=0;

// SOUND POOL
const sounds=[];
for(let i=0;i<5;i++) sounds.push(new Audio("click.mp3"));
let sIndex=0;

// LOAD
let save=JSON.parse(localStorage.getItem("sahurSave"));
if(save){
    points=save.points||0;
    clickPower=save.clickPower||1;
    upCost=save.upCost||10;
    autoCost=save.autoCost||50;
    auto=save.auto||0;
}

// MUSIC START
let musicStarted=false;
function startMusic(){
    if(!musicStarted){
        document.getElementById("music").play();
        musicStarted=true;
    }
}

// CLICK
document.getElementById("character").onclick=(e)=>{
    startMusic();

    // SOUND
    sounds[sIndex].currentTime=0;
    sounds[sIndex].play();
    sIndex=(sIndex+1)%sounds.length;

    // COMBO
    let now=Date.now();
    if(now-lastClick<500) combo++;
    else combo=0;
    lastClick=now;

    let gain=clickPower+combo;

    // CRIT
    if(Math.random()<0.1){
        gain*=3;
        shake();
    }

    points+=gain;
    clicks++;

    floatText("+"+gain,e.pageX,e.pageY);

    let img=document.getElementById("character");
    img.style.transform="scale(1.2)";
    setTimeout(()=>img.style.transform="scale(1)",100);

    update();
};

// FLOAT TEXT
function floatText(txt,x,y){
    let el=document.createElement("div");
    el.className="floating";
    el.innerText=txt;
    el.style.left=x+"px";
    el.style.top=y+"px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
}

// SHAKE
function shake(){
    document.body.classList.add("shake");
    setTimeout(()=>document.body.classList.remove("shake"),200);
}

// SHOP
function buyUpgrade(){
    if(points>=upCost){
        points-=upCost;
        clickPower++;
        upCost=Math.floor(upCost*1.5);
    }
}

function buyAuto(){
    if(points>=autoCost){
        points-=autoCost;
        auto++;
        autoCost=Math.floor(autoCost*1.7);
    }
}

// AUTO
setInterval(()=>{
    points+=auto;
    update();
},1000);

// CPS TRACK
setInterval(()=>{
    cps=clicks;
    clicks=0;
},1000);

// SAVE
setInterval(()=>{
    localStorage.setItem("sahurSave",JSON.stringify({
        points,clickPower,upCost,autoCost,auto
    }));
},3000);

// DAY/NIGHT
setInterval(()=>{
    document.body.style.background=
    document.body.style.background.includes("0f172a")
    ? "black"
    : "linear-gradient(#0f172a,#020617)";
},15000);

// UPDATE UI
function update(){
    document.getElementById("points").innerText=Math.floor(points);
    document.getElementById("combo").innerText=combo;
    document.getElementById("cps").innerText=cps;
    document.getElementById("upCost").innerText=upCost;
    document.getElementById("autoCost").innerText=autoCost;
}
update();
</script>

</body>
</html>
