<!DOCTYPE html>
<html>
<head>
    <title>Tung Sahur Clicker - Galaxy Edition</title>

       <style>
        :root {
            --bg-deep: #020617;
            --panel-bg: rgba(255, 255, 255, 0.1);
            --gold: #fbbf24;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1e1b4b, #020617);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LEFT SIDE - CLICKER AREA */
        .clicker-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #character {
            width: 280px;
            cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(129, 140, 248, 0.5));
            transition: transform 0.05s;
            z-index: 10;
        }

        .stats-top {
            text-align: center;
            position: absolute;
            top: 20px;
            width: 100%;
        }

        .points-main { font-size: 32px; font-weight: bold; margin-bottom: 0; }
        .bps-sub { color: #94a3b8; margin-top: 5px; }

        /* RIGHT SIDE - SHOP SIDEBAR */
        .sidebar {
            width: 380px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-left: 2px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .shop-header {
            text-align: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .shop-item {
            background: rgba(0,0,0,0.4);
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .shop-item:hover { border-color: var(--gold); transform: scale(1.02); }
        .shop-item.disabled { opacity: 0.5; cursor: not-allowed; }

        .item-info { flex: 1; margin-left: 15px; }
        .item-name { font-weight: bold; font-size: 14px; }
        .item-cost { color: var(--gold); font-size: 12px; }
        .item-count { font-size: 24px; font-weight: bold; opacity: 0.5; }

        /* ASCENSION PANEL */
        .ascend-panel {
            margin-top: auto;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .ascend-btn {
            background: linear-gradient(45deg, #7c3aed, #db2777);
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .floating-text {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            animation: floatText 1s ease-out forwards;
        }

        @keyframes floatText {
            to { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>
 

    <div class="clicker-area">
        <div class="stats-top">
            <div class="points-main" id="points">0</div>
            <div class="bps-sub"><span id="bps">0</span> Brainrot Per Second</div>
        </div>
        
        <img id="character" src="yourimage.png" alt="Tung Guy">
        
        <div style="margin-top: 20px; color: #94a3b8;">Click Power: +<span id="clickPowerText">1</span></div>
    </div>

    <div class="sidebar">
        <div class="shop-header">
            <h3>UPGRADES</h3>
        </div>

        <div id="shop-container">
            </div>

        <div class="ascend-panel">
            <div>Ascension Multiplier: <span id="ascMult">1.0</span>x</div>
            <button class="ascend-btn" onclick="ascend()">Ascend<br><small id="ascGain">Next: +0.0x</small></button>
        </div>
    </div>

    <audio id="bgMusic" loop><source src="sahur.mp3"></audio>

<script>
let points = 0;
let totalPointsEver = 0;
let prestigeMultiplier = 1.0;
let clickBase = 1;

const items = [
    { id: 0, name: "The Clicker", cost: 10, power: 1, type: "click", count: 0, icon: "🖱️" },
    { id: 1, name: "Tung Sahur Earth", cost: 100, power: 5, type: "auto", count: 0, icon: "🌍" },
    { id: 2, name: "Tung Sahur Sun", cost: 1000, power: 50, type: "auto", count: 0, icon: "☀️" },
    { id: 3, name: "Tung Sahur Galaxy", cost: 10000, power: 500, type: "auto", count: 0, icon: "🌌" }
];

// Sound Pool
const sounds = Array(5).fill(0).map(() => new Audio("click.mp3"));
let sIdx = 0;

function updateUI() {
    let bps = items.filter(i => i.type === "auto").reduce((sum, i) => sum + (i.count * i.power), 0);
    let clickPower = (items.filter(i => i.type === "click").reduce((sum, i) => sum + (i.count * i.power), clickBase)) * prestigeMultiplier;
    
    document.getElementById("points").innerText = Math.floor(points).toLocaleString();
    document.getElementById("bps").innerText = (bps * prestigeMultiplier).toLocaleString();
    document.getElementById("clickPowerText").innerText = Math.floor(clickPower).toLocaleString();
    document.getElementById("ascMult").innerText = prestigeMultiplier.toFixed(1);
    
    // Calculate potential prestige gain
    let potential = Math.max(0, (Math.floor(Math.sqrt(totalPointsEver / 10000)) * 0.1));
    document.getElementById("ascGain").innerText = "Next: +" + potential.toFixed(1) + "x";

    renderShop();
}

function renderShop() {
    const container = document.getElementById("shop-container");
    container.innerHTML = "";
    items.forEach(item => {
        const div = document.createElement("div");
        div.className = `shop-item ${points < item.cost ? 'disabled' : ''}`;
        div.onclick = () => buyItem(item.id);
        div.innerHTML = `
            <div style="font-size: 30px">${item.icon}</div>
            <div class="item-info">
                <div class="item-name">${item.name}</div>
                <div class="item-cost">💰 ${Math.floor(item.cost).toLocaleString()}</div>
            </div>
            <div class="item-count">${item.count}</div>
        `;
        container.appendChild(div);
    });
}

function buyItem(id) {
    const item = items[id];
    if (points >= item.cost) {
        points -= item.cost;
        item.count++;
        item.cost *= 1.5;
        updateUI();
    }
}

document.getElementById("character").onclick = (e) => {
    // Play Sound
    sounds[sIdx].currentTime = 0;
    sounds[sIdx].play();
    sIdx = (sIdx + 1) % sounds.length;

    let clickPower = (items.filter(i => i.type === "click").reduce((sum, i) => sum + (i.count * i.power), clickBase)) * prestigeMultiplier;
    points += clickPower;
    totalPointsEver += clickPower;

    // Animation
    const img = document.getElementById("character");
    img.style.transform = "scale(0.95)";
    setTimeout(() => img.style.transform = "scale(1)", 50);

    // Floating text
    const txt = document.createElement("div");
    txt.className = "floating-text";
    txt.innerText = "+" + Math.floor(clickPower);
    txt.style.left = e.pageX + "px";
    txt.style.top = e.pageY + "px";
    document.body.appendChild(txt);
    setTimeout(() => txt.remove(), 1000);

    updateUI();
};

function ascend() {
    let gain = Math.floor(Math.sqrt(totalPointsEver / 10000)) * 0.1;
    if (gain <= 0) return alert("Earn more Brainrot to ascend!");
    
    if (confirm("Reset progress for " + gain.toFixed(1) + "x multiplier boost?")) {
        prestigeMultiplier += gain;
        points = 0;
        totalPointsEver = 0;
        items.forEach(i => {
            i.count = 0;
            i.cost = i.id === 0 ? 10 : i.id === 1 ? 100 : i.id === 2 ? 1000 : 10000;
        });
        updateUI();
    }
}

// Auto-click loop
setInterval(() => {
    let bps = items.filter(i => i.type === "auto").reduce((sum, i) => sum + (i.count * i.power), 0);
    points += (bps * prestigeMultiplier) / 10;
    totalPointsEver += (bps * prestigeMultiplier) / 10;
    updateUI();
}, 100);

updateUI();
</script>
</body>
</html>
